name: Jira PR Validation

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: jira-check-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  jira-validation:
    name: jira-validation
    if: |
      github.event_name == 'pull_request_target' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/jira-recheck')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === 'issue_comment') {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              pr = data;
            } else {
              pr = context.payload.pull_request;
            }
            core.setOutput('number', pr.number);
            core.setOutput('title', pr.title);
            core.setOutput('base_branch', pr.base.ref);

      - name: Checkout base branch scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.base_branch }}
          sparse-checkout: .github/scripts

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Run Jira PR validation
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: npx tsx src/validate-pr.ts
